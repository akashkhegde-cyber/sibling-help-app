<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - Akash</title>
    <link rel="icon" type="image/png" href="icon.png" />
    <link rel="apple-touch-icon" href="icon.png" />
    <link rel="shortcut icon" href="icon.png?v=1" type="image/x-icon" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="manifest.json" />

    <meta name="theme-color" content="#764ba2" />

    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("sw.js");
      }
    </script>
    <style>
      body {
        font-family: sans-serif;
        background: #f4f7f6;
        padding: 15px;
        margin: 0;
      }
      .container {
        max-width: 500px;
        margin: auto;
        background: white;
        padding: 20px;
        border-radius: 15px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      }
      .status-btn {
        width: 100%;
        padding: 20px;
        border-radius: 12px;
        border: none;
        color: white;
        font-weight: bold;
        font-size: 18px;
        cursor: pointer;
        margin-bottom: 20px;
      }
      .online {
        background: #28a745;
      }
      .offline {
        background: #dc3545;
      }
      .section {
        margin-top: 25px;
        border-top: 1px solid #eee;
        padding-top: 15px;
      }
      input {
        width: 100%;
        padding: 15px;
        margin: 10px 0;
        border: 1px solid #ddd;
        border-radius: 10px;
        box-sizing: border-box;
      }
      .update-btn {
        background: #007bff;
        color: white;
        border: none;
        padding: 15px;
        width: 100%;
        border-radius: 10px;
        cursor: pointer;
        font-weight: bold;
      }
      .log-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .clear-btn {
        background: #ff4757;
        color: white;
        border: none;
        padding: 8px 12px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 12px;
      }
      .log-item {
        background: #f9f9f9;
        padding: 12px;
        border-radius: 8px;
        margin-bottom: 8px;
        border-left: 5px solid #764ba2;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>Akash's Control</h2>
      <button id="sysToggle" class="status-btn">Connecting...</button>

      <div class="section">
        <h3>Set Credits</h3>
        <input type="number" id="amt" placeholder="Enter amount" />
        <button class="update-btn" id="saveBtn">Set Cloud Credits</button>
      </div>

      <div class="section">
        <div class="log-header">
          <h3>Request History</h3>
          <button class="clear-btn" id="clearBtn">Clear All</button>
        </div>
        <div id="historyLog">Syncing...</div>
      </div>
      <br /><button
        onclick="window.location.href = 'index.html'"
        style="
          width: 100%;
          background: none;
          border: none;
          color: gray;
          cursor: pointer;
        "
      >
        Logout
      </button>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import {
        getDatabase,
        ref,
        set,
        onValue,
        remove,
      } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

      const firebaseConfig = {
        apiKey: "AIzaSyAV3pyiwrB0Cf4e4RxLyATu-i9qnWzX1kY",
        authDomain: "sibling-help-app.firebaseapp.com",
        databaseURL:
          "https://sibling-help-app-default-rtdb.asia-southeast1.firebasedatabase.app/",
        projectId: "sibling-help-app",
        storageBucket: "sibling-help-app.firebasestorage.app",
        messagingSenderId: "563049115784",
        appId: "1:563049115784:web:956b29e691049cc8ebaf3d",
      };

      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);

      // Sync System Status
      onValue(ref(db, "system/status"), (snap) => {
        const s = snap.val() || "Online";
        const btn = document.getElementById("sysToggle");
        btn.innerText = s === "Online" ? "System: ACTIVE" : "System: BUSY";
        btn.className = `status-btn ${s === "Online" ? "online" : "offline"}`;
        btn.onclick = () =>
          set(ref(db, "system/status"), s === "Online" ? "Offline" : "Online");
      });

      // Set Credits
      document.getElementById("saveBtn").onclick = () => {
        set(ref(db, "credits/total"), document.getElementById("amt").value);
        alert("Credits Updated!");
      };

      // Clear History
      document.getElementById("clearBtn").onclick = () => {
        if (confirm("Wipe all request history?")) {
          remove(ref(db, "history"));
          alert("History Cleared!");
        }
      };

      // Live History Update
      onValue(ref(db, "history"), (snap) => {
        const data = snap.val();
        const log = document.getElementById("historyLog");
        if (data) {
          const items = Object.values(data).reverse();
          log.innerHTML = items
            .map(
              (i) => `<div class="log-item"><b>${i.date}</b>: ${i.task}</div>`,
            )
            .join("");
          new Audio(
            "https://assets.mixkit.co/sfx/preview/mixkit-software-interface-start-2574.mp3",
          ).play();
        } else {
          log.innerHTML = "No active requests.";
        }
      });
    </script>
  </body>
</html>
