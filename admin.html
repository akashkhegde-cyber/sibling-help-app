<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - Akash</title>
    <style>
      body {
        font-family: sans-serif;
        background: #f4f7f6;
        padding: 15px;
        margin: 0;
      }
      .container {
        max-width: 500px;
        margin: auto;
        background: white;
        padding: 20px;
        border-radius: 15px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      }
      .status-btn {
        width: 100%;
        padding: 20px;
        border-radius: 12px;
        border: none;
        color: white;
        font-weight: bold;
        font-size: 18px;
        cursor: pointer;
        margin-bottom: 20px;
      }
      .online {
        background: #28a745;
      }
      .offline {
        background: #dc3545;
      }
      input {
        width: 100%;
        padding: 15px;
        margin: 10px 0;
        border: 1px solid #ddd;
        border-radius: 10px;
        box-sizing: border-box;
      }
      .update-btn {
        background: #007bff;
        color: white;
        border: none;
        padding: 15px;
        width: 100%;
        border-radius: 10px;
        font-weight: bold;
        cursor: pointer;
      }
      .log-item {
        background: #f9f9f9;
        padding: 10px;
        border-radius: 8px;
        margin-bottom: 8px;
        border-left: 4px solid #764ba2;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>Akash's Admin</h2>
      <button id="sysToggle" class="status-btn">Connecting...</button>

      <h3>Set Aishwarya's Credits</h3>
      <input type="number" id="amt" placeholder="Enter credits" />
      <button class="update-btn" id="saveBtn">Update Cloud</button>

      <h3 style="margin-top: 30px">Request History</h3>
      <div id="historyLog">No requests yet.</div>
      <br /><button
        onclick="window.location.href = 'index.html'"
        style="width: 100%; background: none; border: none; color: gray"
      >
        Logout
      </button>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import {
        getDatabase,
        ref,
        set,
        onValue,
      } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

      // PASTE YOUR FIREBASE CONFIG HERE
      const firebaseConfig = {
        apiKey: "AIzaSyAV3pyiwrB0Cf4e4RxLyATu-i9qnWzX1kY",
        authDomain: "sibling-help-app.firebaseapp.com",
        databaseURL: "https://sibling-help-app-default-rtdb.asia-southeast1.firebasedatabase.app/",
        projectId: "sibling-help-app",
        storageBucket: "sibling-help-app.firebasestorage.app",
        messagingSenderId: "563049115784",
        appId: "1:563049115784:web:956b29e691049cc8ebaf3d",
      };

      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);

      // Sync Status
      onValue(ref(db, "system/status"), (snap) => {
        const s = snap.val() || "Online";
        const btn = document.getElementById("sysToggle");
        btn.innerText = s === "Online" ? "System: ACTIVE" : "System: BUSY";
        btn.className = `status-btn ${s === "Online" ? "online" : "offline"}`;
        btn.onclick = () =>
          set(ref(db, "system/status"), s === "Online" ? "Offline" : "Online");
      });

      // Update Credits
      document.getElementById("saveBtn").onclick = () => {
        set(ref(db, "credits/total"), document.getElementById("amt").value);
        alert("Credits updated in the Cloud!");
      };

      // Sync History & Sound
      onValue(ref(db, "history"), (snap) => {
        const data = snap.val();
        const log = document.getElementById("historyLog");
        if (data) {
          const items = Object.values(data).reverse();
          log.innerHTML = items
            .map(
              (i) => `<div class="log-item"><b>${i.date}</b>: ${i.task}</div>`,
            )
            .join("");
          new Audio(
            "https://assets.mixkit.co/sfx/preview/mixkit-software-interface-start-2574.mp3",
          ).play();
        }
      });
    </script>
  </body>
</html>
