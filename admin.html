<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - Akash</title>
    <style>
      body {
        font-family: sans-serif;
        background: #f4f7f6;
        padding: 15px;
        margin: 0;
      }
      .container {
        max-width: 500px;
        margin: auto;
        background: white;
        padding: 20px;
        border-radius: 15px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      }
      .status-btn {
        width: 100%;
        padding: 20px;
        border-radius: 12px;
        border: none;
        color: white;
        font-weight: bold;
        font-size: 18px;
        cursor: pointer;
      }
      .online {
        background: #28a745;
      }
      .offline {
        background: #dc3545;
      }
      .section {
        margin-top: 25px;
        border-top: 1px solid #eee;
        padding-top: 15px;
      }
      input {
        width: 100%;
        padding: 15px;
        margin: 10px 0;
        border: 1px solid #ddd;
        border-radius: 10px;
        box-sizing: border-box;
      }
      .update-btn {
        background: #007bff;
        color: white;
        border: none;
        padding: 15px;
        width: 100%;
        border-radius: 10px;
        font-weight: bold;
      }
      .log-item {
        background: #f9f9f9;
        padding: 10px;
        border-radius: 8px;
        margin-bottom: 8px;
        font-size: 14px;
        border-left: 4px solid #764ba2;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>Akash's Control Panel</h2>
      <button id="sysToggle" class="status-btn online" onclick="toggleStatus()">
        System: ACTIVE
      </button>

      <div class="section">
        <h3>Set Aishwarya's Credits</h3>
        <input type="number" id="amt" placeholder="Enter number" />
        <button class="update-btn" onclick="save()">Set Credits</button>
      </div>

      <div class="section">
        <h3>Aishwarya's Requests</h3>
        <div id="historyLog">No requests yet...</div>
      </div>
      <br />
      <button
        onclick="window.location.href = 'index.html'"
        style="
          background: none;
          border: none;
          color: gray;
          width: 100%;
          cursor: pointer;
        "
      >
        Logout
      </button>
    </div>

    <script>
      function toggleStatus() {
        let s =
          localStorage.getItem("sysStatus") === "Offline"
            ? "Online"
            : "Offline";
        localStorage.setItem("sysStatus", s);
        render();
      }
      function save() {
        localStorage.setItem(
          "totalRedeems",
          document.getElementById("amt").value,
        );
        alert("Credits Updated!");
        render();
      }
      function render() {
        const s = localStorage.getItem("sysStatus") || "Online";
        const btn = document.getElementById("sysToggle");
        btn.innerText = s === "Online" ? "System: ACTIVE" : "System: BUSY";
        btn.className = `status-btn ${s === "Online" ? "online" : "offline"}`;

        // Load History
        const history = JSON.parse(localStorage.getItem("helpHistory") || "[]");
        const log = document.getElementById("historyLog");
        if (history.length > 0) {
          log.innerHTML = history
            .reverse()
            .map(
              (item) => `
                    <div class="log-item">
                        <strong>${item.date}</strong>: ${item.task}
                    </div>
                `,
            )
            .join("");
        }
      }
      render();
    </script>
  </body>
</html>
