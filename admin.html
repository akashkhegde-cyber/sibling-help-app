<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - Akash</title>
    <style>
      body {
        font-family: sans-serif;
        background: #f4f7f6;
        padding: 15px;
        margin: 0;
      }
      .container {
        max-width: 500px;
        margin: auto;
        background: white;
        padding: 20px;
        border-radius: 15px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      }
      .status-btn {
        width: 100%;
        padding: 20px;
        border-radius: 12px;
        border: none;
        color: white;
        font-weight: bold;
        font-size: 18px;
        cursor: pointer;
      }
      .online {
        background: #28a745;
      }
      .offline {
        background: #dc3545;
      }
      input {
        width: 100%;
        padding: 15px;
        margin: 15px 0;
        border: 1px solid #ddd;
        border-radius: 10px;
        box-sizing: border-box;
      }
      .update-btn {
        background: #007bff;
        color: white;
        border: none;
        padding: 15px;
        width: 100%;
        border-radius: 10px;
        font-size: 16px;
      }
      .log-box {
        margin-top: 20px;
        border-top: 1px solid #eee;
        padding-top: 10px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>Admin Panel</h2>
      <button id="sysToggle" class="status-btn online" onclick="toggleStatus()">
        System: ACTIVE
      </button>

      <div class="log-box">
        <h3>Set Aishwarya's Redeems</h3>
        <input type="number" id="amt" placeholder="Number of Redeems" />
        <button class="update-btn" onclick="save()">Update Credits</button>
      </div>
      <br />
      <button
        onclick="window.location.href = 'index.html'"
        style="
          background: none;
          border: none;
          color: gray;
          width: 100%;
          cursor: pointer;
        "
      >
        Logout
      </button>
    </div>

    <script>
      function toggleStatus() {
        let s =
          localStorage.getItem("sysStatus") === "Offline"
            ? "Online"
            : "Offline";
        localStorage.setItem("sysStatus", s);
        render();
      }
      function save() {
        localStorage.setItem(
          "totalRedeems",
          document.getElementById("amt").value,
        );
        localStorage.setItem(
          "savedMonth",
          new Date().toLocaleString("default", { month: "long" }),
        );
        alert("Sent to Aishwarya's Dashboard!");
      }
      function render() {
        const s = localStorage.getItem("sysStatus") || "Online";
        const btn = document.getElementById("sysToggle");
        btn.innerText = s === "Online" ? "System: ACTIVE" : "System: BUSY";
        btn.className = `status-btn ${s === "Online" ? "online" : "offline"}`;
      }
      render();
    </script>
  </body>
</html>
