<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Sibling Help App</title>
    <link rel="icon" type="image/png" href="logo.png" />
    <link rel="apple-touch-icon" href="logo.png" />
    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #667eea, #764ba2);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        padding: 20px;
        box-sizing: border-box;
      }
      .login-card {
        background: white;
        padding: 30px;
        border-radius: 20px;
        width: 100%;
        max-width: 350px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      }

      /* Fixed Eye Button Alignment */
      .pass-group {
        position: relative;
        width: 100%;
        margin: 10px 0;
        display: flex;
        align-items: center;
      }
      input {
        width: 100%;
        padding: 15px;
        border: 1px solid #ddd;
        border-radius: 12px;
        box-sizing: border-box;
        font-size: 16px;
      }
      input#pass {
        padding-right: 45px;
      } /* Space for eye */

      .eye-btn {
        position: absolute;
        right: 12px;
        background: none;
        border: none;
        font-size: 20px;
        cursor: pointer;
        color: #764ba2;
        z-index: 10;
      }
      button#enter {
        width: 100%;
        padding: 15px;
        background: #764ba2;
        color: white;
        border: none;
        border-radius: 12px;
        font-weight: bold;
        cursor: pointer;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <div class="login-card">
      <h2>Help App</h2>
      <input type="text" id="user" placeholder="Username" />
      <div class="pass-group">
        <input type="password" id="pass" placeholder="Password" />
        <button class="eye-btn" type="button" onclick="togglePass()">👁️</button>
      </div>
      <button id="enter" onclick="login()">Enter</button>
    </div>

    <script>
      function togglePass() {
        const p = document.getElementById("pass");
        p.type = p.type === "password" ? "text" : "password";
      }
      function login() {
        const u = document.getElementById("user").value;
        const p = document.getElementById("pass").value;
        if (u === "Akash" && p === "akashforever")
          window.location.href = "admin.html";
        else if (u === "Aishwarya" && p === "AISHU123BIRTHCB19")
          window.location.href = "dashboard.html";
        else alert("Incorrect Login!");
      }
    </script>
  </body>
</html>
