<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sibling Help App - Login</title>
    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        padding: 20px;
        box-sizing: border-box;
      }
      .login-card {
        background: white;
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        width: 100%;
        max-width: 350px;
        text-align: center;
      }
      .pass-container {
        position: relative;
        width: 100%;
      }
      input {
        width: 100%;
        padding: 15px;
        margin: 10px 0;
        border: 1px solid #ddd;
        border-radius: 12px;
        box-sizing: border-box;
        font-size: 16px;
      }
      .toggle-btn {
        position: absolute;
        right: 15px;
        top: 22px;
        cursor: pointer;
        background: none;
        border: none;
        font-size: 18px;
      }
      button#loginBtn {
        width: 100%;
        padding: 15px;
        background: #764ba2;
        color: white;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        font-size: 18px;
        font-weight: bold;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <div class="login-card">
      <h2>Help App Login</h2>
      <input type="text" id="user" placeholder="Username" />
      <div class="pass-container">
        <input type="password" id="pass" placeholder="Password" />
        <button class="toggle-btn" type="button" onclick="togglePass()">
          👁️
        </button>
      </div>
      <button id="loginBtn" onclick="login()">Enter</button>
    </div>

    <script>
      function togglePass() {
        const p = document.getElementById("pass");
        p.type = p.type === "password" ? "text" : "password";
      }

      function login() {
        const u = document.getElementById("user").value;
        const p = document.getElementById("pass").value;
        if (u === "Akash" && p === "akashforever") {
          window.location.href = "admin.html";
        } else if (u === "Aishwarya" && p === "AISHU123BIRTHCB19") {
          window.location.href = "dashboard.html";
        } else {
          alert("Incorrect Credentials!");
        }
      }
    </script>
  </body>
</html>
