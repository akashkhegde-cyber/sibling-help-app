<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aishwarya's Dashboard</title>
    <style>
      body {
        font-family: sans-serif;
        background: #eef2f3;
        padding: 20px;
        display: flex;
        justify-content: center;
        margin: 0;
      }
      .card {
        background: white;
        width: 100%;
        max-width: 400px;
        padding: 30px;
        border-radius: 25px;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
        text-align: center;
      }
      .count {
        font-size: 80px;
        color: #6a11cb;
        font-weight: bold;
        margin: 10px 0;
      }
      .status-tag {
        font-size: 12px;
        font-weight: bold;
        padding: 5px 15px;
        border-radius: 20px;
        display: inline-block;
        margin-bottom: 15px;
      }
      .btn-redeem {
        width: 100%;
        padding: 20px;
        background: #28a745;
        color: white;
        border: none;
        border-radius: 15px;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
      }
      .btn-redeem:disabled {
        background: #ccc;
        cursor: not-allowed;
      }
      input {
        width: 100%;
        padding: 15px;
        margin: 15px 0;
        border-radius: 10px;
        border: 1px solid #ddd;
        box-sizing: border-box;
        font-size: 16px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div id="statusTag" class="status-tag">Connecting...</div>
      <p style="color: #888; margin: 0">Credits Available</p>
      <div class="count" id="count">0</div>
      <input type="text" id="task" placeholder="What do you need help with?" />
      <button id="redeemBtn" class="btn-redeem">Redeem Now</button>
      <a
        href="index.html"
        style="
          display: block;
          margin-top: 20px;
          color: #aaa;
          text-decoration: none;
        "
        >Logout</a
      >
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import {
        getDatabase,
        ref,
        set,
        onValue,
        push,
      } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

      // PASTE YOUR FIREBASE CONFIG HERE (Same as admin.html)
      const firebaseConfig = {
        apiKey: "AIzaSyAV3pyiwrB0Cf4e4RxLyATu-i9qnWzX1kY",
        authDomain: "sibling-help-app.firebaseapp.com",
        databaseURL: "https://sibling-help-app-default-rtdb.asia-southeast1.firebasedatabase.app/",
        projectId: "sibling-help-app",
        storageBucket: "sibling-help-app.firebasestorage.app",
        messagingSenderId: "563049115784",
        appId: "1:563049115784:web:956b29e691049cc8ebaf3d",
      };

      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);

      let currentCredits = 0;
      onValue(ref(db, "credits/total"), (snap) => {
        currentCredits = parseInt(snap.val() || 0);
        document.getElementById("count").innerText = currentCredits;
      });

      onValue(ref(db, "system/status"), (snap) => {
        const s = snap.val() || "Online";
        const tag = document.getElementById("statusTag");
        const btn = document.getElementById("redeemBtn");
        if (s === "Offline") {
          tag.innerText = "AKASH IS BUSY";
          tag.style.background = "#ffdce0";
          tag.style.color = "#af233a";
          btn.disabled = true;
        } else {
          tag.innerText = "AKASH IS READY";
          tag.style.background = "#d4edda";
          tag.style.color = "#155724";
          btn.disabled = currentCredits <= 0;
        }
      });

      document.getElementById("redeemBtn").onclick = () => {
        const taskVal = document.getElementById("task").value;
        if (!taskVal) return alert("Type your task first!");
        set(ref(db, "credits/total"), currentCredits - 1);
        push(ref(db, "history"), {
          task: taskVal,
          date: new Date().toLocaleTimeString(),
        });
        document.getElementById("task").value = "";
        alert("Request sent!");
      };
    </script>
  </body>
</html>
