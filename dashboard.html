<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aishwarya's Dashboard</title>
    <style>
      body {
        font-family: sans-serif;
        background: #eef2f3;
        margin: 0;
        padding: 20px;
        display: flex;
        justify-content: center;
      }
      .card {
        background: white;
        width: 100%;
        max-width: 400px;
        padding: 30px;
        border-radius: 25px;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
        text-align: center;
      }
      .count {
        font-size: 90px;
        color: #6a11cb;
        font-weight: bold;
        margin: 10px 0;
      }
      #statusTag {
        font-size: 12px;
        font-weight: bold;
        padding: 5px 15px;
        border-radius: 20px;
        display: inline-block;
        margin-bottom: 10px;
      }
      .btn-redeem {
        width: 100%;
        padding: 20px;
        background: #28a745;
        color: white;
        border: none;
        border-radius: 15px;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
      }
      .btn-redeem:disabled {
        background: #ccc;
      }
      .progress-container {
        background: #eee;
        height: 10px;
        border-radius: 5px;
        margin: 20px 0;
        overflow: hidden;
      }
      .progress-bar {
        background: #6a11cb;
        height: 100%;
        width: 0%;
        transition: 1s;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div id="statusTag">Checking Akash's Status...</div>
      <div class="progress-container">
        <div id="prog" class="progress-bar"></div>
      </div>

      <p style="color: #888; margin: 0">Credits Available</p>
      <div class="count" id="count">0</div>

      <input
        type="text"
        id="task"
        placeholder="What do you need help with?"
        style="
          width: 100%;
          padding: 15px;
          margin-bottom: 15px;
          border-radius: 10px;
          border: 1px solid #ddd;
          box-sizing: border-box;
        "
      />

      <button id="redeemBtn" class="btn-redeem" onclick="redeem()">
        Redeem 1 Day
      </button>
      <a
        href="index.html"
        style="
          display: block;
          margin-top: 20px;
          color: #aaa;
          text-decoration: none;
        "
        >Logout</a
      >
    </div>

    <script>
      function updateUI() {
        const status = localStorage.getItem("sysStatus") || "Online";
        const redeems = parseInt(localStorage.getItem("totalRedeems") || 0);
        const lifetime = parseInt(localStorage.getItem("lifetimeHelp") || 0);

        document.getElementById("count").innerText = redeems;
        document.getElementById("prog").style.width = (lifetime % 50) * 2 + "%";

        const tag = document.getElementById("statusTag");
        const btn = document.getElementById("redeemBtn");

        if (status === "Offline") {
          tag.innerText = "AKASH IS BUSY";
          tag.style.background = "#ffdce0";
          tag.style.color = "#af233a";
          btn.disabled = true;
        } else {
          tag.innerText = "AKASH IS READY";
          tag.style.background = "#d4edda";
          tag.style.color = "#155724";
          btn.disabled = redeems <= 0;
        }
      }

      function redeem() {
        let r = parseInt(localStorage.getItem("totalRedeems") || 0);
        let l = parseInt(localStorage.getItem("lifetimeHelp") || 0);
        if (r > 0) {
          localStorage.setItem("totalRedeems", r - 1);
          localStorage.setItem("lifetimeHelp", l + 1);
          alert("Redeem Successful! Akash has been notified.");
          updateUI();
        }
      }
      setInterval(updateUI, 1000);
      updateUI();
    </script>
  </body>
</html>
